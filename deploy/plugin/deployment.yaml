apiVersion: v1
kind: Service
metadata:
  name: gpu-booking-plugin
  labels:
    app: gpu-booking-plugin
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: gpu-booking-plugin-tls
spec:
  selector:
    app: gpu-booking-plugin
  ports:
    - port: 9001
      targetPort: 9001
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-booking-plugin
  labels:
    app: gpu-booking-plugin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-booking-plugin
  template:
    metadata:
      labels:
        app: gpu-booking-plugin
    spec:
      containers:
        - name: plugin
          image: image-registry.openshift-image-registry.svc:5000/gpu-booking-test/gpu-booking-plugin:latest
          ports:
            - containerPort: 9001
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /plugin-manifest.json
              port: 9001
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /plugin-manifest.json
              port: 9001
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: tls-cert
              mountPath: /var/serving-cert
              readOnly: true
      volumes:
        - name: tls-cert
          secret:
            secretName: gpu-booking-plugin-tls
---
apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: gpu-booking-plugin
spec:
  displayName: GPU Booking Plugin
  backend:
    type: Service
    service:
      name: gpu-booking-plugin
      namespace: gpu-booking-test
      port: 9001
      basePath: /
  proxy:
    - alias: backend
      authorization: UserToken
      endpoint:
        type: Service
        service:
          name: gpu-booking-server
          namespace: gpu-booking-test
          port: 8080
    - alias: agent
      authorization: UserToken
      endpoint:
        type: Service
        service:
          name: gpu-booking-agent
          namespace: gpu-booking-test
          port: 8080
